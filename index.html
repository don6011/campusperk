<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusPerk — Every Student Discount. One Dashboard.</title>
    <meta name="description" content="CampusPerk aggregates, verifies, and alerts you to every student discount — from software to food to fashion. 200+ verified deals in one place." />
    <meta name="author" content="CampusPerk" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://campusperk.com/" />
    <link rel="icon" href="/campusperk-favicon.png" type="image/png" />

    <!-- Open Graph -->
    <meta property="og:title" content="CampusPerk — Every Student Discount. One Dashboard." />
    <meta property="og:description" content="Stop hunting for deals. Discover 200+ verified student discounts in one place." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://campusperk.com/" />
    <meta property="og:site_name" content="CampusPerk" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CampusPerk — Student Discounts Dashboard" />
    <meta name="twitter:description" content="200+ verified student discounts. One dashboard. Zero effort." />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CampusPerk",
      "url": "https://campusperk.com",
      "description": "CampusPerk aggregates, verifies, and alerts you to every student discount — from software to food to fashion.",
      "applicationCategory": "ShoppingApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
